<!DOCTYPE html>

<head>

<title>Merci — Clareo Solutions</title>

<link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><circle cx="32" cy="32" r="28" fill="none" stroke="%230A0E17" stroke-width="4"/><path d="M32 12 L38 32 L32 52 L26 32 Z" fill="%232E51FF"/><path d="M32 12 L38 32 H26 Z" fill="%23E5482B"/></svg>'>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Instrument Sans',system-ui,sans-serif;
    background:
      radial-gradient(900px 500px at 50% -10%, rgba(46,81,255,.25), transparent 60%),
      #0A0E17;
    color:#F4F3EE;min-height:100vh;display:grid;place-items:center;text-align:center;padding:28px;
  }
  .card{max-width:520px}
  svg.mark{width:88px;height:88px;margin-bottom:30px}
  h1{font-family:'Schibsted Grotesk',sans-serif;font-size:clamp(30px,5vw,44px);font-weight:800;letter-spacing:-.02em;margin-bottom:14px}
  p{color:#B9BECB;font-size:17px;line-height:1.6;margin-bottom:36px}
  a.btn{
    display:inline-block;font-weight:600;font-size:15px;color:#fff;text-decoration:none;
    background:#2E51FF;padding:14px 28px;border-radius:100px;transition:transform .2s, box-shadow .2s;
  }
  a.btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(46,81,255,.35)}
  .mono{font-family:'Spline Sans Mono',monospace;font-size:12.5px;color:#9AA0B0;margin-top:28px;letter-spacing:.08em}
</style>
</head>
<body>
  <div class="card">
    <svg class="mark" viewBox="0 0 64 64" aria-hidden="true"><circle cx="32" cy="32" r="27" fill="none" stroke="#F4F3EE" stroke-width="3"/><path d="M32 13 L38 32 L32 51 L26 32 Z" fill="rgba(247,246,241,.12)"/><path d="M32 13 L38 32 H26 Z" fill="#E5482B"/><path d="M32 51 L38 32 H26 Z" fill="#2E51FF"/><circle cx="32" cy="32" r="4" fill="#0A0E17" stroke="#F4F3EE" stroke-width="2"/></svg>

    <p>Merci pour votre message — on revient vers vous sous 24 h ouvrées pour planifier votre diagnostic gratuit de 30 minutes.</p>
    <a class="btn" href="/">Retour au site</a>
    <div class="mono">CLAREO SOLUTIONS · PARIS</div>
  </div>
